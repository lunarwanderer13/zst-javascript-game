<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Javascript Game</title>
        <link rel="stylesheet" href="./src/styles/style.css">
        <link rel="stylesheet" href="./src/styles/modal.css">
        <link rel="stylesheet" href="./src/styles/game.css">
        <link rel="icon" href="./favicon.ico" type="image/x-icon">
    </head>
    <body>
        <div class="start-modal modal">
            <div class="modal-body">
                <h1><img src="./src/images/Placeholder.png" alt="Placeholder"></h1>
                <section>
                    <div class="rules-container">
                        <p><b>1.</b> Press "JUMP" or space to jump</p>
                        <p><b>2.</b> Going out of bounds results in a crash</p>
                        <p><b>3.</b> Hitting a scratching post results in a crash</p>
                        <p><b>4.</b> Gain points by avoiding the scratching posts.</p>
                        <p><b>5.</b> Get as many points as you can, and Good Luck & Have Fun!</p>
                    </div>
                </section>
                <button id="start-button">START</button>
            </div>
        </div>

        <main>
            <header>
                <h1><img src="./src/images/Placeholder.png" alt="Placeholder"></h1>
                <h3>Score: 0</h3>
            </header>
            <div class="game-container">
                <div class="obstacle">
                    <img src="./src/images/Placeholder.png">
                    <img src="./src/images/Placeholder.png">
                 </div>
            </div>
        </main>
        <div class="button-container">
            <button id="jump-button">START</button>
        </div>


        <a class="gh-badge" href="https://github.com/lunarwanderer13/zst-javascript-game">
            <img src="./src/images/github_icon.webp" alt="GitHub">
        </a>

        <script type="module" src="dist/scripts/game.js"></script>
    </body>
</html>
